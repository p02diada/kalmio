services:
  db:
    image: postgis/postgis:16-3.4
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:?POSTGRES_DB is required}
      POSTGRES_USER: ${POSTGRES_USER:?POSTGRES_USER is required}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD is required}
    volumes:
      - postgis_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $$POSTGRES_USER -d $$POSTGRES_DB"]
      interval: 10s
      timeout: 5s
      retries: 10

  backend:
    build:
      context: ./backend
    restart: unless-stopped
    environment:
      KALMIO_ENV: production
      DJANGO_DEBUG: "false"
      DJANGO_SECRET_KEY: ${DJANGO_SECRET_KEY:?DJANGO_SECRET_KEY is required}
      DJANGO_ALLOWED_HOSTS: ${DJANGO_ALLOWED_HOSTS:?DJANGO_ALLOWED_HOSTS is required}
      CORS_ALLOWED_ORIGINS: ${CORS_ALLOWED_ORIGINS:?CORS_ALLOWED_ORIGINS is required}
      CSRF_TRUSTED_ORIGINS: ${CSRF_TRUSTED_ORIGINS:?CSRF_TRUSTED_ORIGINS is required}
      KALMIO_DB_ENGINE: postgis
      KALMIO_ROUTING_PROVIDER: osrm
      KALMIO_OSRM_BASE_URL: ${KALMIO_OSRM_BASE_URL:?KALMIO_OSRM_BASE_URL is required}
      KALMIO_OSRM_TIMEOUT_SECONDS: ${KALMIO_OSRM_TIMEOUT_SECONDS:-5}
      KALMIO_ENABLE_ADMIN: ${KALMIO_ENABLE_ADMIN:-false}
      KALMIO_ADMIN_PATH: ${KALMIO_ADMIN_PATH:-admin/}
      KALMIO_ENABLE_API_DOCS: ${KALMIO_ENABLE_API_DOCS:-false}
      KALMIO_AUTH_THROTTLE_LIMIT: ${KALMIO_AUTH_THROTTLE_LIMIT:-5}
      KALMIO_AUTH_THROTTLE_WINDOW_SECONDS: ${KALMIO_AUTH_THROTTLE_WINDOW_SECONDS:-900}
      KALMIO_LOG_LEVEL: ${KALMIO_LOG_LEVEL:-INFO}
      POSTGRES_DB: ${POSTGRES_DB:?POSTGRES_DB is required}
      POSTGRES_USER: ${POSTGRES_USER:?POSTGRES_USER is required}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD is required}
      POSTGRES_HOST: db
      POSTGRES_PORT: "5432"
      POSTGRES_SSLMODE: ${POSTGRES_SSLMODE:-disable}
    ports:
      - "8000:8000"
    depends_on:
      db:
        condition: service_healthy
    healthcheck:
      test:
        [
          "CMD",
          "python",
          "-c",
          "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/api/health', timeout=3).read()",
        ]
      interval: 30s
      timeout: 5s
      retries: 5
      start_period: 20s

  frontend:
    build:
      context: ./frontend
      target: production
      args:
        VITE_API_BASE_URL: ${VITE_API_BASE_URL:?VITE_API_BASE_URL is required}
    restart: unless-stopped
    ports:
      - "8080:80"
    depends_on:
      backend:
        condition: service_healthy
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "wget -q -O /dev/null http://127.0.0.1/ && ! wget -q -O - http://127.0.0.1/api/health | grep -q '<!doctype html'",
        ]
      interval: 30s
      timeout: 5s
      retries: 5
      start_period: 10s

volumes:
  postgis_data:
