services:
  db:
    image: postgis/postgis:16-3.4
    environment:
      POSTGRES_DB: kalmio
      POSTGRES_USER: kalmio
      POSTGRES_PASSWORD: kalmio
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U kalmio -d kalmio"]
      interval: 5s
      timeout: 5s
      retries: 10

  backend:
    build:
      context: ./backend
    environment:
      DJANGO_DEBUG: "true"
      DJANGO_SECRET_KEY: "dev-only-compose-secret"
      DJANGO_ALLOWED_HOSTS: "localhost,127.0.0.1,0.0.0.0,backend"
      CORS_ALLOWED_ORIGINS: "http://localhost:5173,http://127.0.0.1:5173"
      CSRF_TRUSTED_ORIGINS: "http://localhost:5173,http://127.0.0.1:5173"
      KALMIO_DB_ENGINE: postgis
      KALMIO_ROUTING_PROVIDER: osrm
      KALMIO_OSRM_BASE_URL: https://router.project-osrm.org
      KALMIO_OSRM_TIMEOUT_SECONDS: "5"
      POSTGRES_DB: kalmio
      POSTGRES_USER: kalmio
      POSTGRES_PASSWORD: kalmio
      POSTGRES_HOST: db
      POSTGRES_PORT: "5432"
    command: >
      sh -c "python manage.py migrate &&
             python manage.py runserver 0.0.0.0:8000"
    volumes:
      - ./backend:/app
    ports:
      - "8000:8000"
    depends_on:
      db:
        condition: service_healthy

  frontend:
    build:
      context: ./frontend
      target: dev
    command: npm run dev -- --host 0.0.0.0
    environment:
      VITE_API_BASE_URL: http://localhost:8000
    volumes:
      - ./frontend:/app
      - frontend_node_modules:/app/node_modules
    ports:
      - "5173:5173"
    depends_on:
      - backend

volumes:
  postgres_data:
  frontend_node_modules:
