services:
  db:
    image: postgis/postgis:16-3.4
    environment:
      POSTGRES_DB: kalmio_ci
      POSTGRES_USER: kalmio
      POSTGRES_PASSWORD: ci-postgres-password-4f750d65
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U kalmio -d kalmio_ci"]
      interval: 5s
      timeout: 5s
      retries: 10

  backend-ci:
    build:
      context: ./backend
    environment:
      KALMIO_DB_ENGINE: postgis
      KALMIO_ROUTING_PROVIDER: osrm
      KALMIO_OSRM_BASE_URL: https://routes.kalmio.example
      POSTGRES_DB: kalmio_ci
      POSTGRES_USER: kalmio
      POSTGRES_PASSWORD: ci-postgres-password-4f750d65
      POSTGRES_HOST: db
      POSTGRES_PORT: "5432"
      POSTGRES_SSLMODE: disable
    command: sh scripts/ci_backend.sh
    depends_on:
      db:
        condition: service_healthy

  frontend-ci:
    image: node:20-slim
    working_dir: /app
    volumes:
      - ./frontend:/app
      - frontend_ci_node_modules:/app/node_modules
      - frontend_ci_dist:/app/dist
    command: >
      sh -c "npm ci &&
             npm run lint &&
             npm run test -- --run &&
             npm run build"

volumes:
  frontend_ci_node_modules:
  frontend_ci_dist:
